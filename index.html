<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Premal & Shivani</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Cormorant+Garamond:ital,wght@1,300&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── base ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  /* Safari-safe full viewport height */
  --vh: 100vh;
}

html {
  height: -webkit-fill-available;
}

body {
  width: 100%;
  height: 100vh;
  height: -webkit-fill-available;
  background: #000;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  color: #fff;
  -webkit-font-smoothing: antialiased;
  /* prevent double-tap zoom on mobile */
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}

/* ── stage + scenes ── */
#stage {
  position: relative;
  width: 100%;
  height: 100%;
}

.scene {
  position: absolute;
  inset: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity .75s ease;
  overflow: hidden;
}
.scene.active {
  opacity: 1;
  pointer-events: all;
}


/* ════════════════════════════════
   S1 · INTRO
════════════════════════════════ */
#s-intro {
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* local MP4 video — fills scene */
#intro-video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity .4s;
  pointer-events: none;
}

/* tap overlay */
#tap-cover {
  position: absolute;
  inset: 0;
  z-index: 5;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  cursor: pointer;
}

.tap-n {
  width: clamp(80px, 14vw, 140px);
}

.tap-ring {
  width: 68px; height: 68px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(229,9,20,.4); }
  50%      { box-shadow: 0 0 0 18px rgba(229,9,20,0); }
}

.tap-label {
  font-size: clamp(10px, 2.5vw, 13px);
  letter-spacing: .22em;
  color: rgba(255,255,255,.45);
  text-transform: uppercase;
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:.45} 50%{opacity:1} }


/* ════════════════════════════════
   S2 · WHO'S WATCHING
════════════════════════════════ */
#s-profiles {
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
}

/* red ground glow */
#s-profiles::before {
  content: '';
  position: absolute;
  bottom: -30%; left: 50%;
  transform: translateX(-50%);
  width: 170%; height: 70%;
  background: radial-gradient(ellipse at center bottom,
    #cc0000 0%, #990000 14%, #550000 30%, transparent 65%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}

.whos-title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 300;
  font-size: clamp(22px, 5vw, 44px);
  color: #fff;
  margin-bottom: clamp(28px, 5vh, 50px);
  letter-spacing: .01em;
  position: relative; z-index: 2;
}

.profiles-row {
  display: flex;
  gap: clamp(14px, 4vw, 36px);
  margin-bottom: clamp(24px, 4vh, 44px);
  position: relative; z-index: 2;
}

.profile-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: transform .2s;
}
/* desktop hover */
@media (hover: hover) {
  .profile-item:hover { transform: scale(1.07); }
  .profile-item:hover .profile-photo { outline: 3px solid #fff; }
}
/* mobile tap */
.profile-item:active { transform: scale(0.96); }

.profile-photo {
  width: clamp(80px, 18vw, 150px);
  height: clamp(80px, 18vw, 150px);
  border-radius: 5px;
  overflow: hidden;
  background: #1c1c1c;
  flex-shrink: 0;
}
.profile-photo img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center top;
  display: block;
}

.profile-label {
  font-size: clamp(10px, 2.5vw, 14px);
  color: rgba(255,255,255,.82);
  font-weight: 400;
  letter-spacing: .02em;
}

.manage-btn {
  position: relative; z-index: 2;
  font-family: 'Inter', sans-serif;
  font-size: clamp(9px, 2vw, 12px);
  font-weight: 500;
  color: #fff;
  background: transparent;
  border: 1.5px solid rgba(255,255,255,.6);
  padding: 9px 24px;
  letter-spacing: .18em;
  text-transform: uppercase;
  cursor: default;
}


/* ════════════════════════════════
   S3 · NETFLIX HOME
════════════════════════════════ */
#s-home {
  background: #141414;
  display: flex;
  flex-direction: column;
}

/* floating buttons */
.home-back-btn,
.home-credits-btn {
  position: absolute;
  top: max(12px, env(safe-area-inset-top, 12px));
  z-index: 50;
  font-family: 'Inter', sans-serif;
  font-size: clamp(11px, 2.5vw, 14px);
  font-weight: 600;
  padding: 8px 16px;
  border-radius: 5px;
  cursor: pointer;
  border: none;
  transition: opacity .2s;
}
.home-back-btn:active,
.home-credits-btn:active { opacity: .7; }

.home-back-btn {
  left: max(14px, env(safe-area-inset-left, 14px));
  background: rgba(0,0,0,.65);
  border: 1px solid rgba(255,255,255,.3);
  color: #fff;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.home-credits-btn {
  right: max(14px, env(safe-area-inset-right, 14px));
  background: #e50914;
  color: #fff;
}

/* nav */
.nf-nav {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  padding: clamp(12px,2vh,22px) clamp(20px,4vw,52px);
  background: linear-gradient(to bottom, rgba(0,0,0,.95), transparent);
  gap: clamp(12px,2vw,24px);
}
.nf-logo {
  font-family: 'Inter', sans-serif;
  font-weight: 800;
  font-size: clamp(18px,4vw,32px);
  color: #e50914;
  letter-spacing: -.03em;
  flex-shrink: 0;
}
.nf-links {
  display: flex;
  gap: clamp(8px,1.5vw,18px);
  list-style: none;
  flex-wrap: nowrap;
}
.nf-links li a {
  color: rgba(255,255,255,.65);
  text-decoration: none;
  font-size: clamp(9px,1.8vw,13px);
  white-space: nowrap;
}
.nf-links li:first-child a { color: #fff; font-weight: 500; }

/* hero */
.nf-hero {
  position: relative;
  width: 100%;
  height: 52%;
  min-height: 220px;
  flex-shrink: 0;
}
.nf-hero-bg {
  position: absolute; inset: 0;
  background: #0d1117;
}
.nf-hero-bg img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center 20%;
  display: block;
}
.nf-hero-overlay {
  position: absolute; inset: 0;
  background:
    linear-gradient(to right, rgba(0,0,0,.9) 0%, rgba(0,0,0,.5) 50%, transparent 80%),
    linear-gradient(to top, #141414 0%, transparent 45%);
}
.nf-hero-content {
  position: absolute;
  bottom: clamp(16px,4vh,56px);
  left: clamp(20px,4vw,52px);
  max-width: min(50%, 440px);
}
@media (max-width: 600px) {
  .nf-hero-content { max-width: 70%; }
}

.nf-badge {
  display: flex; align-items: center; gap: 5px;
  margin-bottom: 5px;
}
.nf-badge svg { width: 14px; height: 14px; flex-shrink: 0; }
.nf-badge-text {
  font-size: clamp(8px,1.5vw,11px);
  letter-spacing: .22em;
  color: rgba(255,255,255,.75);
  text-transform: uppercase;
}

.nf-hero-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 700;
  font-size: clamp(22px, 5vw, 58px);
  color: #f5c518;
  line-height: 1;
  margin-bottom: 8px;
  text-transform: lowercase;
}
.nf-hero-desc {
  font-size: clamp(9px,1.5vw,13px);
  color: rgba(255,255,255,.68);
  margin-bottom: 12px;
  line-height: 1.5;
  font-weight: 300;
}
.nf-hero-btns { display: flex; gap: 8px; }

.btn-play, .btn-ec {
  display: flex; align-items: center; gap: 6px;
  border: none; border-radius: 3px;
  padding: clamp(6px,1.2vh,9px) clamp(12px,2vw,18px);
  font-size: clamp(10px,1.8vw,14px);
  font-weight: 700;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: opacity .2s;
}
.btn-play:active, .btn-ec:active { opacity: .7; }
.btn-play { background: #fff; color: #000; }
.btn-ec   { background: rgba(109,109,110,.75); color: #fff; }

/* tile rows */
.nf-rows {
  flex: 1;
  overflow: hidden;
  padding: clamp(4px,1vh,10px) clamp(20px,4vw,52px) clamp(6px,1vh,14px);
  display: flex;
  flex-direction: column;
  gap: clamp(6px,1.5vh,16px);
}
.row-label {
  font-size: clamp(11px,2.5vw,17px);
  font-weight: 500;
  color: #fff;
  margin-bottom: clamp(4px,.8vh,8px);
}
.tiles {
  display: flex;
  gap: clamp(3px,.6vw,7px);
}
.tile {
  flex: 1;
  aspect-ratio: 3/2;
  border-radius: 3px;
  overflow: hidden;
  background: #1e1e1e;
  flex-shrink: 0;
}
.tile img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
}


/* ════════════════════════════════
   S4 · CREDITS
════════════════════════════════ */
#s-credits {
  background: #000;
  display: flex;
  align-items: center;
  padding: 0 5% 0 7%;
  gap: 5%;
}

/* left photo slideshow */
.credits-photo {
  flex-shrink: 0;
  width: clamp(110px,18vw,190px);
  height: clamp(110px,18vw,190px);
  border-radius: 8px;
  overflow: hidden;
  transform: rotate(-4deg);
  box-shadow: 4px 10px 28px rgba(0,0,0,.7);
  align-self: center;
  position: relative;
}
.slide-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center top;
  opacity: 0;
  transition: opacity .9s ease;
}
.slide-img.on { opacity: 1; }

/* scrolling credits */
.credits-text-wrap {
  flex: 1;
  overflow: hidden;
  height: 85%;
  display: flex;
  align-items: center;
  mask-image: linear-gradient(to bottom,
    transparent 0%, black 15%, black 85%, transparent 100%);
  -webkit-mask-image: linear-gradient(to bottom,
    transparent 0%, black 15%, black 85%, transparent 100%);
}

@keyframes scrollUp {
  0%   { transform: translateY(65vh); }
  100% { transform: translateY(-120%); }
}

.credits-inner {
  display: flex;
  flex-direction: column;
  gap: clamp(10px,1.8vh,18px);
}

.credit-row {
  display: flex;
  gap: clamp(12px,2.5vw,24px);
  align-items: baseline;
}
.c-label {
  width: clamp(120px,18vw,220px);
  flex-shrink: 0;
  text-align: right;
  font-size: clamp(10px,1.8vw,14px);
  color: rgba(255,255,255,.5);
  font-weight: 300;
  line-height: 1.6;
}
.c-value {
  font-size: clamp(10px,1.8vw,14px);
  color: #fff;
  font-weight: 400;
  line-height: 1.6;
}
</style>
</head>
<body>

<!-- AUDIO — Beete Lamhein (play from 00:47 on credits) -->
<audio id="bgm" preload="auto">
  <source src="audio/Beete Lamhein The Train 320 Kbps.mp3" type="audio/mpeg">
</audio>

<div id="stage">

  <!-- ── S1: INTRO ── -->
  <div class="scene active" id="s-intro">
    <!-- local Netflix intro MP4 -->
    <video id="intro-video" playsinline webkit-playsinline preload="auto">
      <source src="netflix-intro.mp4" type="video/mp4">
    </video>
    <!-- tap overlay -->
    <div id="tap-cover" onclick="beginExperience()">
      <svg class="tap-n" viewBox="0 0 111 190">
        <polygon points="0,0 27,0 27,190 0,190"    fill="#E50914"/>
        <polygon points="84,0 111,0 111,190 84,190" fill="#E50914"/>
        <polygon points="0,0 27,0 111,190 84,190"  fill="#E50914"/>
      </svg>
      <div class="tap-ring">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="#fff">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
      </div>
      <span class="tap-label">Tap to begin</span>
    </div>
  </div>

  <!-- ── S2: WHO'S WATCHING ── -->
  <div class="scene" id="s-profiles">
    <p class="whos-title">Who's Watching?</p>
    <div class="profiles-row" id="profiles-row"></div>
    <button class="manage-btn">MANAGE PROFILES</button>
  </div>

  <!-- ── S3: NETFLIX HOME ── -->
  <div class="scene" id="s-home">
    <button class="home-back-btn"    onclick="goTo('profiles')">&#8592; Back</button>
    <button class="home-credits-btn" onclick="goTo('credits')">View End Credits</button>

    <nav class="nf-nav">
      <span class="nf-logo">NETFLIX</span>
      <ul class="nf-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">TV Shows</a></li>
        <li><a href="#">Movies</a></li>
        <li><a href="#">My List</a></li>
      </ul>
    </nav>

    <div class="nf-hero">
      <div class="nf-hero-bg" id="home-hero-bg"></div>
      <div class="nf-hero-overlay"></div>
      <div class="nf-hero-content">
        <div class="nf-badge">
          <svg viewBox="0 0 111 190">
            <polygon points="0,0 27,0 27,190 0,190"    fill="#E50914"/>
            <polygon points="84,0 111,0 111,190 84,190" fill="#E50914"/>
            <polygon points="0,0 27,0 111,190 84,190"  fill="#E50914"/>
          </svg>
          <span class="nf-badge-text">SERIES</span>
        </div>
        <h1 class="nf-hero-title" id="home-title"></h1>
        <p  class="nf-hero-desc"  id="home-desc"></p>
        <div class="nf-hero-btns">
          <button class="btn-play">
            <svg width="11" height="11" viewBox="0 0 11 11">
              <path d="M0 0l11 5.5L0 11V0z" fill="#000"/>
            </svg>
            Play
          </button>
          <button class="btn-ec" onclick="goTo('credits')">View End Credits</button>
        </div>
      </div>
    </div>

    <div class="nf-rows">
      <div>
        <div class="row-label">Moments Together</div>
        <div class="tiles" id="home-popular"></div>
      </div>
      <div>
        <div class="row-label">Favourite Memories</div>
        <div class="tiles" id="home-recent"></div>
      </div>
    </div>
  </div>

  <!-- ── S4: CREDITS ── -->
  <div class="scene" id="s-credits">
    <div class="credits-photo" id="credits-slideshow"></div>
    <div class="credits-text-wrap">
      <div class="credits-inner" id="credits-inner"></div>
    </div>
  </div>

</div><!-- /stage -->

<script>
// ─────────────────────────────────────────
// Fix Safari 100vh via JS
// ─────────────────────────────────────────
function setVH() {
  document.documentElement.style.setProperty('--vh', window.innerHeight + 'px');
  document.body.style.height = window.innerHeight + 'px';
  document.getElementById('stage').style.height = window.innerHeight + 'px';
}
setVH();
window.addEventListener('resize', setVH);

// ─────────────────────────────────────────
// PHOTO DATA
// ─────────────────────────────────────────
const P = {
  val:   'images/valentine.jpg',
  aug24: 'images/ms1.jpg',
  sep24: 'images/ms2.jpg',
  oct24a:'images/p1.jpg',
  oct24b:'images/p2.jpg',
  dec24: 'images/hero.jpg',
  feb25a:'images/ms3.jpg',
  feb25b:'images/player.jpg',
  apr25a:'images/ms4.jpg',
  apr25b:'images/p3.jpg',
  apr25c:'images/p4.jpg',
  apr25d:'images/r2.jpg',
  apr25e:'images/r3.jpg',
  apr25f:'images/r4.jpg',
  apr25g:'images/credits.jpg',
  may25a:'images/p5.jpg',
  may25b:'images/r1.jpg',
};

// Milestones — each has its own hero + tile set
const MILESTONES = [
  {
    label:'1 month',   photo: P.aug24,
    heading: 'the beginning',
    desc:    'Where it all started. The first chapter of us.',
    hero: P.aug24,
    popular: [P.aug24, P.aug24, P.aug24, P.aug24, P.aug24],
    recent:  [P.aug24, P.aug24, P.aug24, P.aug24, P.aug24],
  },
  {
    label:'3 months',  photo: P.oct24a,
    heading: 'three months of us',
    desc:    'Every call, every text — growing closer every day.',
    hero: P.dec24,
    popular: [P.aug24, P.sep24, P.oct24a, P.oct24b, P.dec24],
    recent:  [P.dec24, P.oct24b, P.oct24a, P.sep24, P.aug24],
  },
  {
    label:'6 months',  photo: P.feb25a,
    heading: 'half a year in love',
    desc:    'Six months and still falling harder.',
    hero: P.feb25b,
    popular: [P.feb25a, P.feb25b, P.dec24, P.oct24a, P.sep24],
    recent:  [P.feb25b, P.feb25a, P.oct24b, P.dec24, P.aug24],
  },
  {
    label:'10 months', photo: P.may25a,
    heading: 'ten months & counting',
    desc:    'Every moment with you is the best one yet.',
    hero: P.apr25a,
    popular: [P.apr25a, P.apr25b, P.apr25c, P.apr25d, P.apr25e],
    recent:  [P.apr25f, P.apr25g, P.may25a, P.may25b, P.apr25b],
  },
];

// Credits slideshow — valentine first (5 000 ms), rest 2 800 ms
const SLIDES = [
  { src: P.val,   ms: 5000 },
  { src: P.aug24, ms: 2800 },
  { src: P.sep24, ms: 2800 },
  { src: P.oct24a,ms: 2800 },
  { src: P.dec24, ms: 2800 },
  { src: P.feb25a,ms: 2800 },
  { src: P.feb25b,ms: 2800 },
  { src: P.apr25a,ms: 2800 },
  { src: P.apr25b,ms: 2800 },
  { src: P.apr25c,ms: 2800 },
  { src: P.may25a,ms: 2800 },
  { src: P.apr25g,ms: 2800 },
  { src: P.may25b,ms: 2800 },
];

const CREDITS_DATA = [
  ['Directed by',             'God'],
  ['Cast',                    ''],
  ['Boyfriend',               'Premal'],
  ['Girlfriend',              'Shivani'],
  ['Written by',              'Fate & destiny'],
  ['Produced by',             'Patience & support'],
  ['Director of photography', 'Our camera rolls'],
  ['Location',                'Canada'],
  ['Chief editor',            'Our favorite memories'],
  ['Soundtrack',              'Melodies of us'],
  ['Executive producers',     'Shared Future Plans'],
  ['Technical advisor',       'Honest communication'],
  ['Catering by',             'Midnight cravings'],
  ['Stunt coordinators',      'Arguments & Fights'],
  ['Time management',         '"Five more minutes"'],
  ['Wardrobe designer',       "Each other's hoodies"],
  ['Chief motivator',         'Family & friends'],
];

// ─────────────────────────────────────────
// ROUTING
// ─────────────────────────────────────────
let _ssTimer = null;
let _ssIdx   = 0;

function goTo(key) {
  document.querySelectorAll('.scene').forEach(el => el.classList.remove('active'));
  if (key === 'credits') _startCredits();
  document.getElementById('s-' + key).classList.add('active');
}

// ─────────────────────────────────────────
// S1 · INTRO — local MP4
// ─────────────────────────────────────────
let _introStarted = false;

function beginExperience() {
  if (_introStarted) return;
  _introStarted = true;

  const cover = document.getElementById('tap-cover');
  const vid   = document.getElementById('intro-video');

  // fade out tap overlay
  cover.style.transition = 'opacity .45s';
  cover.style.opacity = '0';
  setTimeout(() => { cover.style.display = 'none'; }, 500);

  // show + play video
  vid.style.opacity = '1';
  vid.muted = false;
  vid.volume = 1;
  vid.play().catch(() => {
    // If unmuted play blocked (old iOS), play muted
    vid.muted = true;
    vid.play().catch(() => {});
  });

  // go to profiles when video ends (or after 6s fallback)
  vid.addEventListener('ended', () => goTo('profiles'), { once: true });
  setTimeout(() => goTo('profiles'), 6000);
}

// ─────────────────────────────────────────
// S2 · WHO'S WATCHING
// ─────────────────────────────────────────
function _buildProfiles() {
  document.getElementById('profiles-row').innerHTML = MILESTONES.map((m, i) => `
    <div class="profile-item" onclick="openMilestone(${i})">
      <div class="profile-photo">
        <img src="${m.photo}" alt="${m.label}" loading="eager">
      </div>
      <span class="profile-label">${m.label}</span>
    </div>`).join('');
}

// ─────────────────────────────────────────
// S3 · NETFLIX HOME
// ─────────────────────────────────────────
function openMilestone(idx) {
  const m = MILESTONES[idx];

  // hero bg
  document.getElementById('home-hero-bg').innerHTML =
    `<img src="${m.hero}" alt="">`;

  // text
  document.getElementById('home-title').textContent = m.heading;
  document.getElementById('home-desc').textContent  = m.desc;

  // tiles
  _buildTiles('home-popular', m.popular);
  _buildTiles('home-recent',  m.recent);

  goTo('home');
}

function _buildTiles(id, photos) {
  document.getElementById(id).innerHTML = photos.map(src =>
    `<div class="tile"><img src="${src}" alt="" loading="lazy"></div>`
  ).join('');
}

// ─────────────────────────────────────────
// S4 · CREDITS
// ─────────────────────────────────────────
function _buildCreditsList() {
  document.getElementById('credits-inner').innerHTML = CREDITS_DATA.map(([l, v]) =>
    `<div class="credit-row">
       <span class="c-label">${l}</span>
       <span class="c-value">${v}</span>
     </div>`
  ).join('');
}

function _buildSlideshowDOM() {
  document.getElementById('credits-slideshow').innerHTML =
    SLIDES.map((s, i) =>
      `<img class="slide-img${i===0?' on':''}" src="${s.src}" alt="" loading="lazy">`
    ).join('');
}

function _startCredits() {
  // reset credits scroll
  const inner = document.getElementById('credits-inner');
  inner.style.animation = 'none';
  void inner.offsetHeight;
  inner.style.animation = 'scrollUp 20s linear forwards';

  // reset slideshow
  clearTimeout(_ssTimer);
  _ssIdx = 0;
  const imgs = document.querySelectorAll('#credits-slideshow .slide-img');
  imgs.forEach((el, i) => el.classList.toggle('on', i === 0));
  _nextSlide(imgs);

  // play music from 00:47
  const audio = document.getElementById('bgm');
  if (audio) {
    audio.currentTime = 47;
    audio.volume = 0.85;
    audio.play().catch(() => {});
  }
}

function _nextSlide(imgs) {
  if (!imgs.length) return;
  _ssTimer = setTimeout(() => {
    imgs[_ssIdx].classList.remove('on');
    _ssIdx = (_ssIdx + 1) % imgs.length;
    imgs[_ssIdx].classList.add('on');
    _nextSlide(imgs);
  }, SLIDES[_ssIdx].ms);
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
_buildProfiles();
_buildCreditsList();
_buildSlideshowDOM();
</script>
</body>
</html>
