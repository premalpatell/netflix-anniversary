<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100vh;background:#000;overflow:hidden;font-family:'Inter',sans-serif;color:#fff;-webkit-font-smoothing:antialiased}

/* ─── SCENES ─── */
#stage{position:relative;width:100%;height:100vh}
.scene{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .85s ease}
.scene.active{opacity:1;pointer-events:all}

/* ══════════════════════════════
   SCENE 1 · INTRO
══════════════════════════════ */
#s-intro{
  background:#000;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:32px;
  overflow:hidden;position:relative
}

#yt-bg{
  position:absolute;inset:0;
  pointer-events:none;z-index:0;
  opacity:0;transition:opacity .5s
}
#yt-bg iframe{
  width:100%;height:100%;
  position:absolute;
  /* scale up to fill & hide controls letterbox */
  transform:scale(1.35);
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(1.4)
}

.n-logo{
  width:clamp(90px,12vw,150px);
  position:relative;z-index:2;
  opacity:0
}
.n-logo.show{animation:nIntro 2.8s cubic-bezier(.34,1.4,.64,1) forwards}

@keyframes nIntro{
  0%  {opacity:0;transform:scale(.06);filter:drop-shadow(0 0 0 #e50914)}
  25% {opacity:1}
  60% {transform:scale(1.18);filter:drop-shadow(0 0 70px #e50914cc)}
  80% {transform:scale(.96)}
  100%{transform:scale(1);filter:drop-shadow(0 0 28px #e5091444)}
}

/* Tap to begin overlay */
#tap-cover{
  position:absolute;inset:0;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;gap:24px
}
.tap-n{
  width:clamp(90px,12vw,150px)
}
.tap-ring{
  width:80px;height:80px;border-radius:50%;
  border:2px solid rgba(255,255,255,.25);
  display:flex;align-items:center;justify-content:center;
  animation:ringPulse 2s ease-in-out infinite
}
.tap-ring svg{margin-left:4px}
@keyframes ringPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(229,9,20,.3)}
  50%{box-shadow:0 0 0 18px rgba(229,9,20,0)}
}
.tap-label{
  font-size:clamp(11px,1.2vw,14px);
  letter-spacing:.22em;color:rgba(255,255,255,.5);
  text-transform:uppercase;
  animation:blink 2s ease-in-out infinite
}
@keyframes blink{0%,100%{opacity:.5}50%{opacity:1}}

/* ══════════════════════════════
   SCENE 2 · WHO'S WATCHING
══════════════════════════════ */
#s-profiles{
  background:#000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  position:relative;overflow:hidden;gap:0
}
/* red ground glow */
#s-profiles::before{
  content:'';position:absolute;bottom:-28%;left:50%;
  transform:translateX(-50%);
  width:170%;height:72%;
  background:radial-gradient(ellipse at center bottom,
    #d50000 0%,#aa0000 12%,#6b0000 28%,#2a0000 48%,transparent 68%);
  border-radius:50%;pointer-events:none;opacity:.95
}
.whos-title{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
  font-size:clamp(24px,3.2vw,44px);color:#fff;
  margin-bottom:clamp(32px,4vh,52px);letter-spacing:.01em;
  position:relative;z-index:2
}
.profiles-row{
  display:flex;gap:clamp(18px,2.8vw,36px);
  margin-bottom:clamp(28px,3.5vh,44px);
  position:relative;z-index:2
}
.profile-item{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  cursor:pointer;
  transition:transform .2s
}
.profile-item:hover{transform:scale(1.06)}
.profile-item:hover .profile-photo{box-shadow:0 0 0 3px #fff}
.profile-photo{
  width:clamp(96px,12.5vw,156px);height:clamp(96px,12.5vw,156px);
  border-radius:5px;overflow:hidden;
  background:#1c1c1c;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:box-shadow .2s
}
.profile-photo img{width:100%;height:100%;object-fit:cover;display:block}
.profile-label{
  font-size:clamp(11px,1.3vw,15px);
  color:rgba(255,255,255,.82);font-weight:400;letter-spacing:.02em
}
.manage-btn{
  position:relative;z-index:2;
  font-family:'Inter',sans-serif;font-size:clamp(9px,1vw,13px);font-weight:500;
  color:#fff;background:transparent;
  border:1.5px solid rgba(255,255,255,.65);
  padding:9px 24px;letter-spacing:.18em;text-transform:uppercase;cursor:default
}

/* ══════════════════════════════
   SCENE 3 · NETFLIX HOME
══════════════════════════════ */
#s-home{
  background:#141414;display:flex;flex-direction:column;
  overflow:hidden;position:relative
}

/* back + credits buttons */
.home-back-btn{
  position:absolute;top:clamp(10px,1.5vh,18px);left:clamp(10px,1.5vw,18px);
  z-index:50;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.25);
  color:#fff;font-family:'Inter',sans-serif;font-size:clamp(11px,1.1vw,14px);
  font-weight:500;padding:7px 14px;border-radius:4px;cursor:pointer;
  letter-spacing:.04em;backdrop-filter:blur(8px);
  transition:background .2s
}
.home-back-btn:hover{background:rgba(255,255,255,.12)}

.home-credits-btn{
  position:absolute;top:clamp(10px,1.5vh,18px);right:clamp(10px,1.5vw,18px);
  z-index:50;background:#e50914;border:none;
  color:#fff;font-family:'Inter',sans-serif;font-size:clamp(11px,1.1vw,14px);
  font-weight:600;padding:7px 16px;border-radius:4px;cursor:pointer;
  letter-spacing:.04em;
  transition:background .2s
}
.home-credits-btn:hover{background:#c40812}

/* nav */
.nf-nav{
  position:absolute;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;
  padding:clamp(10px,1.6vh,20px) clamp(24px,3.2vw,52px);
  background:linear-gradient(to bottom,rgba(0,0,0,.95) 0%,transparent 100%);
  gap:clamp(14px,2vw,28px)
}
.nf-wordmark{
  font-family:'Inter',sans-serif;font-weight:700;letter-spacing:-.03em;
  font-size:clamp(20px,2.8vw,36px);color:#e50914;flex-shrink:0
}
.nf-nav-links{display:flex;gap:clamp(10px,1.5vw,20px);list-style:none;flex-wrap:nowrap}
.nf-nav-links li a{
  color:rgba(255,255,255,.68);text-decoration:none;
  font-size:clamp(10px,1.1vw,14px);font-weight:400;white-space:nowrap
}
.nf-nav-links li:first-child a{color:#fff;font-weight:500}

/* hero */
.nf-hero{position:relative;width:100%;height:54vh;min-height:250px;flex-shrink:0}
.nf-hero-bg-ph{
  position:absolute;inset:0;
  background:linear-gradient(120deg,#0d1117 0%,#1a2035 40%,#0f3460 70%,#1a1a2e 100%)
}
.nf-hero-bg-ph img{
  width:100%;height:100%;object-fit:cover;
  position:absolute;inset:0;display:block
}
.nf-hero-overlay{
  position:absolute;inset:0;
  background:
    linear-gradient(to right,rgba(0,0,0,.9) 0%,rgba(0,0,0,.55) 45%,transparent 80%),
    linear-gradient(to top,#141414 0%,rgba(20,20,20,.2) 35%,transparent 60%)
}
.nf-hero-content{
  position:absolute;
  bottom:clamp(20px,5.5vh,68px);
  left:clamp(24px,3.2vw,52px);
  max-width:min(44%,500px)
}
.nf-series-badge{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.nf-badge-n{width:16px;height:16px;flex-shrink:0}
.nf-series-label{
  font-size:clamp(9px,.85vw,12px);letter-spacing:.24em;
  color:rgba(255,255,255,.78);font-weight:500;text-transform:uppercase
}
.nf-hero-title{
  font-family:'Playfair Display',serif;font-style:italic;font-weight:700;
  font-size:clamp(28px,4.8vw,66px);
  color:#f5c518;line-height:1;margin-bottom:10px;text-transform:lowercase
}
.nf-hero-desc{
  font-size:clamp(10px,1vw,13px);color:rgba(255,255,255,.7);
  margin-bottom:14px;line-height:1.5;font-weight:300
}
.nf-hero-btns{display:flex;gap:8px}
.nf-btn-play{
  display:flex;align-items:center;gap:7px;
  background:#fff;color:#000;border:none;border-radius:3px;
  padding:7px 20px;font-size:clamp(11px,1.2vw,15px);
  font-weight:700;font-family:'Inter',sans-serif;cursor:default
}
.nf-btn-credits{
  display:flex;align-items:center;gap:7px;
  background:rgba(109,109,110,.72);color:#fff;
  border:none;border-radius:3px;
  padding:7px 20px;font-size:clamp(11px,1.2vw,15px);
  font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;
  transition:background .2s
}
.nf-btn-credits:hover{background:rgba(150,150,150,.7)}

/* rows */
.nf-rows{
  flex:1;overflow:hidden;
  padding:clamp(4px,1vh,10px) clamp(24px,3.2vw,52px) clamp(8px,1.5vh,16px);
  display:flex;flex-direction:column;gap:clamp(6px,1.2vh,18px)
}
.nf-row-label{
  font-size:clamp(12px,1.4vw,18px);font-weight:500;color:#fff;
  margin-bottom:clamp(4px,.8vh,10px)
}
.nf-tiles{display:flex;gap:clamp(4px,.6vw,8px)}
.nf-tile{
  flex:1;aspect-ratio:16/9;border-radius:3px;overflow:hidden;
  background:#222;flex-shrink:0;position:relative
}
.nf-tile img{width:100%;height:100%;object-fit:cover;display:block}

/* ══════════════════════════════
   SCENE 4 · CREDITS
══════════════════════════════ */
#s-credits{
  background:#000;
  display:flex;align-items:center;
  padding:0 5% 0 8%;gap:6%;overflow:hidden
}

.credits-photo-wrap{
  flex-shrink:0;
  width:clamp(120px,15vw,190px);height:clamp(120px,15vw,190px);
  border-radius:8px;overflow:hidden;
  transform:rotate(-4deg);
  box-shadow:4px 10px 28px rgba(0,0,0,.65);
  align-self:center;position:relative
}
/* slideshow imgs inside the wrap */
.credits-photo-wrap .slide-img{
  position:absolute;inset:0;
  width:100%;height:100%;object-fit:cover;
  opacity:0;transition:opacity 1s ease
}
.credits-photo-wrap .slide-img.on{opacity:1}

.credits-text-wrap{
  flex:1;overflow:hidden;height:88vh;
  display:flex;align-items:center;
  mask-image:linear-gradient(to bottom,transparent 0%,black 16%,black 84%,transparent 100%);
  -webkit-mask-image:linear-gradient(to bottom,transparent 0%,black 16%,black 84%,transparent 100%)
}
.credits-inner{
  display:flex;flex-direction:column;
  gap:clamp(10px,1.4vh,16px)
}
.credit-row{display:flex;gap:clamp(14px,2vw,24px);align-items:baseline}
.c-label{
  width:clamp(130px,17vw,230px);flex-shrink:0;text-align:right;
  font-size:clamp(10px,1.1vw,14px);color:rgba(255,255,255,.55);
  font-weight:300;line-height:1.5
}
.c-value{
  font-size:clamp(10px,1.1vw,14px);color:#fff;
  font-weight:400;line-height:1.5
}
</style>

<script>

// ══════════════════════════════════════════
// SCENE ROUTING
// ══════════════════════════════════════════
const SCENES = { intro:'s-intro', profiles:'s-profiles', home:'s-home', credits:'s-credits' };
let current = 'intro';
let creditsScrollTimer  = null;
let slideshowTimer      = null;
let slideIdx            = 0;

function goTo(key) {
  // deactivate all
  Object.values(SCENES).forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('active');
  });
  // prep target
  if (key === 'credits') prepCredits();
  // activate
  document.getElementById(SCENES[key]).classList.add('active');
  current = key;

// ══════════════════════════════════════════
// YOUTUBE INTRO
// ══════════════════════════════════════════
let ytPlayer = null;
let ytReady  = false;

window._ytReadyCb = function() { ytReady = true; };

function beginExperience() {
  const cover = document.getElementById('tap-cover');
  cover.style.pointerEvents = 'none';
  cover.style.transition = 'opacity .5s';
  cover.style.opacity = '0';
  setTimeout(() => cover.remove(), 500);

  // Try embedding YouTube
  loadYouTube();

  // Regardless of YT status, move to profiles after 5s
  setTimeout(() => goTo('profiles'), 5000);
}

function loadYouTube() {
  const bg = document.getElementById('yt-bg');
  bg.style.opacity = '1';

  const div = document.createElement('div');
  div.id = 'yt-player-el';
  bg.appendChild(div);

  function createPlayer() {
    ytPlayer = new YT.Player('yt-player-el', {
      videoId: 'GV3HUDMQ-F8',
      width: '100%', height: '100%',
      playerVars: {
        autoplay: 1, controls: 0, disablekb: 1,
        fs: 0, iv_load_policy: 3, modestbranding: 1,
        playsinline: 1, rel: 0, showinfo: 0,
        start: 0, mute: 0
      },
      events: {
        onReady: e => { try { e.target.setVolume(100); e.target.playVideo(); } catch(_){} },
        onError: ()=> { bg.style.opacity = '0'; }
      }
    });
  }

  if (window.YT && YT.Player) {
    createPlayer();
  } else {
    // Wait up to 3s for the API to load
    let tries = 0;
    const interval = setInterval(() => {
      tries++;
      if (window.YT && YT.Player) { clearInterval(interval); createPlayer(); }
      else if (tries > 30) { clearInterval(interval); bg.style.opacity = '0'; }
    }, 100);
  }
}

// ══════════════════════════════════════════
// WHO'S WATCHING
// ══════════════════════════════════════════
function buildProfiles() {
  const row = document.getElementById('profiles-row');
  row.innerHTML = MILESTONES.map((m, i) => `
    <div class="profile-item" onclick="openMilestone(${i})">
      <div class="profile-photo">
        <img src="${m.photo}" alt="${m.label}" loading="eager">
      </div>
      <span class="profile-label">${m.label}</span>
    </div>
  `).join('');
}

// ══════════════════════════════════════════
// NETFLIX HOME (milestone-specific)
// ══════════════════════════════════════════
function openMilestone(idx) {
  const m = MILESTONES[idx];

  // Update hero
  const heroBg = document.getElementById('home-hero-bg');
  heroBg.innerHTML = `<img src="${m.hero}" alt="">`;

  // Update text
  document.getElementById('home-title').textContent = m.heading;
  document.getElementById('home-desc').textContent  = m.desc;

  // Update tiles
  buildTiles('home-popular', m.popular);
  buildTiles('home-recent',  m.recent);

  goTo('home');
}

function buildTiles(containerId, photos) {
  document.getElementById(containerId).innerHTML =
    photos.map(src => `
      <div class="nf-tile">
        <img src="${src}" alt="" loading="lazy">
      </div>`).join('');
}

// ══════════════════════════════════════════
// CREDITS  (slideshow + scroll)
// ══════════════════════════════════════════
function buildCreditsList() {
  document.getElementById('credits-inner').innerHTML =
    CREDITS_DATA.map(([lbl, val]) => `
      <div class="credit-row">
        <span class="c-label">${lbl}</span>
        <span class="c-value">${val}</span>
      </div>`).join('');
}

function buildSlideshow() {
  const wrap = document.getElementById('credits-slideshow');
  wrap.innerHTML = ALL_PHOTOS.map((src, i) => `
    <img class="slide-img${i===0?' on':''}" src="${src}" alt="" loading="lazy">
  `).join('');
}

function prepCredits() {
  // Reset scroll
  clearInterval(slideshowTimer);
  clearTimeout(creditsScrollTimer);

  const inner = document.getElementById('credits-inner');
  inner.style.animation = 'none';
  void inner.offsetHeight; // reflow
  inner.style.animation = 'creditsScroll 18s linear forwards';
  inner.style.animationDelay = '0.8s';

  // Reset slideshow
  slideIdx = 0;
  const imgs = document.querySelectorAll('#credits-slideshow .slide-img');
  imgs.forEach((img, i) => img.classList.toggle('on', i === 0));

  slideshowTimer = setInterval(() => {
    const imgs2 = document.querySelectorAll('#credits-slideshow .slide-img');
    if (!imgs2.length) return;
    imgs2[slideIdx].classList.remove('on');
    slideIdx = (slideIdx + 1) % imgs2.length;
    imgs2[slideIdx].classList.add('on');
  }, 2800);
}

// Inject credits scroll keyframe
(function(){
  const s = document.createElement('style');
  s.textContent = `
    @keyframes creditsScroll {
      0%   { transform: translateY(65vh); }
      100% { transform: translateY(-115%); }
    }`;
  document.head.appendChild(s);
})();

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
buildProfiles();
buildCreditsList();
buildSlideshow();
</script>
</body>
</html>
