<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Premal & Shivani</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&family=Cormorant+Garamond:ital,wght@1,300&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{height:-webkit-fill-available}
body{
  width:100%;height:100vh;height:-webkit-fill-available;
  background:#000;overflow:hidden;
  font-family:'Inter',sans-serif;color:#fff;
  -webkit-font-smoothing:antialiased;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
}

#stage{position:relative;width:100%;height:100%}
.scene{
  position:absolute;inset:0;opacity:0;pointer-events:none;
  transition:opacity .7s ease;overflow:hidden;
}
.scene.active{opacity:1;pointer-events:all}


/* ═══════════════════════════
   INTRO
═══════════════════════════ */
#s-intro{background:#000;display:flex;align-items:center;justify-content:center}

#intro-video{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;opacity:0;transition:opacity .4s;pointer-events:none;
}
#tap-cover{
  position:absolute;inset:0;z-index:5;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;
  cursor:pointer;
}
.tap-n{width:clamp(80px,14vw,140px)}
.tap-ring{
  width:68px;height:68px;border-radius:50%;
  border:2px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(229,9,20,.4)}50%{box-shadow:0 0 0 18px rgba(229,9,20,0)}}
.tap-label{
  font-size:clamp(10px,2.5vw,13px);letter-spacing:.22em;
  color:rgba(255,255,255,.45);text-transform:uppercase;
  animation:blink 2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:.45}50%{opacity:1}}


/* ═══════════════════════════
   WHO'S WATCHING
═══════════════════════════ */
#s-profiles{
  background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
#s-profiles::before{
  content:'';position:absolute;bottom:-30%;left:50%;
  transform:translateX(-50%);width:170%;height:70%;
  background:radial-gradient(ellipse at center bottom,
    #cc0000 0%,#990000 14%,#550000 30%,transparent 65%);
  border-radius:50%;pointer-events:none;
}
.whos-title{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
  font-size:clamp(22px,5vw,44px);color:#fff;
  margin-bottom:clamp(28px,5vh,52px);letter-spacing:.01em;
  position:relative;z-index:2;
}
.profiles-row{
  display:flex;gap:clamp(14px,4vw,36px);
  margin-bottom:clamp(24px,4vh,44px);
  position:relative;z-index:2;flex-wrap:nowrap;
}
/* 2×2 on mobile */
@media(max-width:560px){
  .profiles-row{
    flex-wrap:wrap;justify-content:center;
    max-width:min(340px,94vw);gap:clamp(14px,4vw,20px);
  }
  .profile-item{flex:0 0 calc(50% - clamp(7px,2vw,10px))}
  .profile-photo{width:100%!important;height:auto!important;aspect-ratio:1}
}
.profile-item{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  cursor:pointer;transition:transform .2s;
}
@media(hover:hover){
  .profile-item:hover{transform:scale(1.07)}
  .profile-item:hover .profile-photo{outline:3px solid #fff}
}
.profile-item:active{transform:scale(.95)}
.profile-photo{
  width:clamp(82px,18vw,150px);height:clamp(82px,18vw,150px);
  border-radius:5px;overflow:hidden;background:#1c1c1c;flex-shrink:0;
}
.profile-photo img{
  width:100%;height:100%;
  object-fit:cover;object-position:center 10%;display:block;
}
.profile-label{
  font-size:clamp(10px,2.5vw,14px);
  color:rgba(255,255,255,.82);font-weight:400;letter-spacing:.02em;
}
.manage-btn{
  position:relative;z-index:2;
  font-family:'Inter',sans-serif;font-size:clamp(9px,2vw,12px);font-weight:500;
  color:#fff;background:transparent;
  border:1.5px solid rgba(255,255,255,.6);
  padding:9px 24px;letter-spacing:.18em;text-transform:uppercase;cursor:default;
}


/* ═══════════════════════════
   NETFLIX HOME
═══════════════════════════ */
#s-home{background:#141414;display:flex;flex-direction:column}

.nf-nav{
  position:absolute;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;
  padding:clamp(12px,2vh,22px) clamp(20px,4vw,52px);
  background:linear-gradient(to bottom,rgba(0,0,0,.95),transparent);
  gap:clamp(12px,2vw,22px);
}
.nf-logo{
  font-family:'Inter',sans-serif;font-weight:800;letter-spacing:-.03em;
  font-size:clamp(18px,4vw,32px);color:#e50914;flex-shrink:0;
}
.nf-links{display:flex;gap:clamp(8px,1.5vw,18px);list-style:none;flex-wrap:nowrap}
.nf-links li a{
  color:rgba(255,255,255,.65);text-decoration:none;
  font-size:clamp(9px,1.8vw,13px);white-space:nowrap;
}
.nf-links li:first-child a{color:#fff;font-weight:500}

/* hero */
.nf-hero{
  position:relative;width:100%;
  height:56%;min-height:220px;flex-shrink:0;
}
.nf-hero-bg{position:absolute;inset:0;background:#0d1117}
.nf-hero-bg img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:center 15%;display:block;
}
.nf-hero-overlay{
  position:absolute;inset:0;
  background:
    linear-gradient(to right,rgba(0,0,0,.88) 0%,rgba(0,0,0,.45) 50%,transparent 80%),
    linear-gradient(to top,#141414 0%,transparent 45%);
}
.nf-hero-content{
  position:absolute;
  bottom:clamp(12px,2.5vh,44px);
  left:clamp(20px,4vw,52px);
  max-width:min(52%,460px);
}
@media(max-width:600px){.nf-hero-content{max-width:72%}}

.nf-badge{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.nf-badge svg{width:13px;height:13px;flex-shrink:0}
.nf-badge-text{
  font-size:clamp(8px,1.5vw,11px);letter-spacing:.22em;
  color:rgba(255,255,255,.72);text-transform:uppercase;
}
.nf-hero-title{
  font-family:'Playfair Display',serif;font-style:italic;font-weight:700;
  font-size:clamp(20px,5vw,56px);color:#f5c518;
  line-height:1;margin-bottom:8px;text-transform:lowercase;
}
.nf-hero-desc{
  font-size:clamp(9px,1.5vw,13px);color:rgba(255,255,255,.68);
  margin-bottom:12px;line-height:1.5;font-weight:300;
}
.nf-hero-btns{display:flex;gap:8px}
.btn-play,.btn-ec{
  display:flex;align-items:center;gap:6px;border:none;border-radius:3px;
  padding:clamp(6px,1.2vh,9px) clamp(12px,2vw,18px);
  font-size:clamp(10px,1.8vw,14px);font-weight:700;
  font-family:'Inter',sans-serif;cursor:pointer;transition:opacity .18s;
}
.btn-play:active,.btn-ec:active{opacity:.7}
.btn-play{background:#fff;color:#000}
.btn-ec{background:rgba(109,109,110,.75);color:#fff}

/* ONE photo row — bigger portrait tiles, horizontal scroll */
.nf-photo-section{
  flex:1;overflow:hidden;
  padding:clamp(8px,1.5vh,14px) 0 clamp(44px,7vh,58px);
  display:flex;flex-direction:column;
}
.row-label{
  font-size:clamp(12px,2.5vw,18px);font-weight:500;color:#fff;
  margin-bottom:clamp(6px,1vh,10px);
  padding:0 clamp(20px,4vw,52px);
}
/* horizontally scrollable tile strip */
.tiles-strip{
  display:flex;gap:clamp(6px,1vw,10px);
  overflow-x:auto;overflow-y:hidden;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  padding:0 clamp(20px,4vw,52px) 8px;
  scrollbar-width:none;
}
.tiles-strip::-webkit-scrollbar{display:none}

.tile{
  flex:0 0 clamp(130px,22vw,230px);
  aspect-ratio:3/4;        /* portrait — shows more of the person */
  border-radius:5px;overflow:hidden;
  background:#1e1e1e;
  scroll-snap-align:start;
  cursor:pointer;position:relative;
  transition:transform .18s;flex-shrink:0;
}
@media(hover:hover){.tile:hover{transform:scale(1.04);z-index:2}}
.tile:active{transform:scale(.97)}
.tile img{
  width:100%;height:100%;
  object-fit:cover;object-position:center 10%;
  display:block;pointer-events:none;
}
.tile-date{
  position:absolute;bottom:5px;left:6px;
  font-size:clamp(8px,1.2vw,11px);
  color:rgba(255,255,255,.92);
  background:rgba(0,0,0,.62);
  padding:2px 6px;border-radius:3px;
  font-family:'Inter',sans-serif;
  pointer-events:none;letter-spacing:.03em;white-space:nowrap;
}

/* bottom bar — subtle nav */
.home-bottom-bar{
  position:absolute;bottom:0;left:0;right:0;z-index:20;
  height:clamp(40px,6vh,52px);
  background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(20px,4vw,52px);
}
.hbb-btn{
  background:none;border:none;
  color:rgba(255,255,255,.52);
  font-size:clamp(10px,1.8vw,13px);
  font-family:'Inter',sans-serif;font-weight:500;
  letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;transition:color .2s;padding:6px 0;
}
@media(hover:hover){.hbb-btn:hover{color:#fff}}
.hbb-btn:active{color:#fff}


/* ═══════════════════════════
   CREDITS
═══════════════════════════ */
#s-credits{
  background:#000;display:flex;align-items:center;
  padding:0 4% 0 6%;gap:5%;
}
.credits-photo{
  flex-shrink:0;
  width:clamp(180px,28vw,340px);height:clamp(180px,28vw,340px);
  border-radius:10px;overflow:hidden;
  transform:rotate(-4deg);
  box-shadow:6px 14px 44px rgba(0,0,0,.75);
  align-self:center;position:relative;
}
.slide-img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:center 10%;
  opacity:0;transition:opacity .9s ease;
}
.slide-img.on{opacity:1}

.credits-text-wrap{
  flex:1;overflow:hidden;height:85%;
  display:flex;align-items:center;
  mask-image:linear-gradient(to bottom,transparent 0%,black 14%,black 86%,transparent 100%);
  -webkit-mask-image:linear-gradient(to bottom,transparent 0%,black 14%,black 86%,transparent 100%);
}
@keyframes scrollUp{0%{transform:translateY(70vh)}100%{transform:translateY(-125%)}}
.credits-inner{display:flex;flex-direction:column;gap:clamp(10px,1.8vh,18px)}
.credit-row{display:flex;gap:clamp(12px,2.5vw,24px);align-items:baseline}
.c-label{
  width:clamp(120px,18vw,220px);flex-shrink:0;text-align:right;
  font-size:clamp(10px,1.8vw,14px);color:rgba(255,255,255,.5);
  font-weight:300;line-height:1.6;
}
.c-value{font-size:clamp(10px,1.8vw,14px);color:#fff;font-weight:400;line-height:1.6}


/* ═══════════════════════════
   MILESTONE SLIDESHOW OVERLAY
═══════════════════════════ */
#ss-overlay{
  position:fixed;inset:0;z-index:900;
  background:rgba(0,0,0,.96);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
#ss-overlay.open{opacity:1;pointer-events:all}

#ss-close{
  position:absolute;top:max(18px,env(safe-area-inset-top,18px));right:20px;
  background:none;border:none;color:rgba(255,255,255,.7);
  font-size:32px;cursor:pointer;line-height:1;padding:4px;z-index:2;
  transition:color .2s;
}
#ss-close:active,#ss-close:hover{color:#fff}

/* photo area with arrows */
.ss-row{
  display:flex;align-items:center;
  gap:clamp(10px,3vw,28px);
  width:100%;
  justify-content:center;
  padding:0 clamp(16px,4vw,48px);
}
.ss-arrow{
  background:rgba(255,255,255,.08);
  border:none;color:rgba(255,255,255,.7);
  font-size:clamp(24px,5vw,40px);
  width:clamp(38px,6vw,54px);height:clamp(38px,6vw,54px);
  border-radius:50%;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:background .18s,color .18s;
}
.ss-arrow:active,.ss-arrow:hover{background:rgba(255,255,255,.18);color:#fff}

#ss-img-wrap{
  position:relative;display:flex;flex-direction:column;align-items:center;gap:14px;
  max-width:min(80vw,420px);
}
#ss-img{
  max-width:100%;max-height:65vh;
  border-radius:10px;
  object-fit:contain;
  box-shadow:0 8px 48px rgba(0,0,0,.8);
  display:block;
}
#ss-date{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(13px,2.5vw,18px);
  color:rgba(255,255,255,.65);letter-spacing:.04em;
  min-height:1.4em;text-align:center;
}
#ss-counter{
  font-size:clamp(10px,1.8vw,13px);
  color:rgba(255,255,255,.35);letter-spacing:.06em;
}

/* progress dots */
#ss-dots{
  display:flex;gap:7px;align-items:center;margin-top:16px;
}
.ss-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,.28);transition:background .25s,transform .25s;
}
.ss-dot.on{background:#e50914;transform:scale(1.4)}


/* ═══════════════════════════
   LIGHTBOX (tile click)
═══════════════════════════ */
#lightbox{
  position:fixed;inset:0;z-index:950;
  background:rgba(0,0,0,.93);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;padding:20px;
}
#lightbox.open{opacity:1;pointer-events:all}
.lb-inner{
  position:relative;
  display:flex;flex-direction:column;align-items:center;gap:14px;
  max-width:min(88vw,500px);
}
#lb-img{
  max-width:100%;max-height:72vh;
  border-radius:10px;object-fit:contain;
  box-shadow:0 8px 48px rgba(0,0,0,.8);
}
.lb-close{
  position:absolute;top:-44px;right:-4px;
  background:none;border:none;color:rgba(255,255,255,.7);
  font-size:32px;cursor:pointer;line-height:1;transition:color .2s;
}
.lb-close:active,.lb-close:hover{color:#fff}
.lb-date{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(13px,3vw,19px);
  color:rgba(255,255,255,.65);letter-spacing:.04em;
}
</style>
</head>
<body>

<audio id="bgm" preload="auto">
  <source src="audio/Beete Lamhein The Train 320 Kbps.mp3" type="audio/mpeg">
</audio>

<!-- ── MILESTONE SLIDESHOW ── -->
<div id="ss-overlay">
  <button id="ss-close" onclick="closeSS()">&#215;</button>
  <div class="ss-row">
    <button class="ss-arrow" onclick="ssStep(-1)">&#8249;</button>
    <div id="ss-img-wrap">
      <img id="ss-img" src="" alt="">
      <div id="ss-date"></div>
      <div id="ss-counter"></div>
    </div>
    <button class="ss-arrow" onclick="ssStep(1)">&#8250;</button>
  </div>
  <div id="ss-dots"></div>
</div>

<!-- ── LIGHTBOX ── -->
<div id="lightbox" onclick="closeLB()">
  <div class="lb-inner" onclick="event.stopPropagation()">
    <button class="lb-close" onclick="closeLB()">&#215;</button>
    <img id="lb-img" src="" alt="">
    <div id="lb-date" class="lb-date"></div>
  </div>
</div>

<div id="stage">

  <!-- INTRO -->
  <div class="scene active" id="s-intro">
    <video id="intro-video" playsinline webkit-playsinline preload="auto">
      <source src="netflix-intro.mp4" type="video/mp4">
    </video>
    <div id="tap-cover" onclick="beginExperience()">
      <svg class="tap-n" viewBox="0 0 111 190">
        <polygon points="0,0 27,0 27,190 0,190"    fill="#E50914"/>
        <polygon points="84,0 111,0 111,190 84,190" fill="#E50914"/>
        <polygon points="0,0 27,0 111,190 84,190"  fill="#E50914"/>
      </svg>
      <div class="tap-ring">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="#fff">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
      </div>
      <span class="tap-label">Tap to begin</span>
    </div>
  </div>

  <!-- WHO'S WATCHING -->
  <div class="scene" id="s-profiles">
    <p class="whos-title">Who's Watching?</p>
    <div class="profiles-row" id="profiles-row"></div>
    <button class="manage-btn">MANAGE PROFILES</button>
  </div>

  <!-- NETFLIX HOME -->
  <div class="scene" id="s-home">
    <nav class="nf-nav">
      <span class="nf-logo">NETFLIX</span>
      <ul class="nf-links">
        <li><a>Home</a></li>
        <li><a>TV Shows</a></li>
        <li><a>Movies</a></li>
        <li><a>My List</a></li>
      </ul>
    </nav>

    <div class="nf-hero">
      <div class="nf-hero-bg" id="home-hero-bg"></div>
      <div class="nf-hero-overlay"></div>
      <div class="nf-hero-content">
        <div class="nf-badge">
          <svg viewBox="0 0 111 190">
            <polygon points="0,0 27,0 27,190 0,190"    fill="#E50914"/>
            <polygon points="84,0 111,0 111,190 84,190" fill="#E50914"/>
            <polygon points="0,0 27,0 111,190 84,190"  fill="#E50914"/>
          </svg>
          <span class="nf-badge-text">SERIES</span>
        </div>
        <h1 class="nf-hero-title" id="home-title"></h1>
        <p  class="nf-hero-desc"  id="home-desc"></p>
        <div class="nf-hero-btns">
          <!-- Play opens milestone slideshow -->
          <button class="btn-play" id="home-play-btn">
            <svg width="11" height="11" viewBox="0 0 11 11">
              <path d="M0 0l11 5.5L0 11V0z" fill="#000"/>
            </svg>Play
          </button>
          <button class="btn-ec" onclick="goTo('credits')">View End Credits</button>
        </div>
      </div>
    </div>

    <!-- single photo row, horizontally scrollable, bigger portrait tiles -->
    <div class="nf-photo-section">
      <div class="row-label">Our Story</div>
      <div class="tiles-strip" id="home-tiles"></div>
    </div>

    <div class="home-bottom-bar">
      <button class="hbb-btn" onclick="goTo('profiles')">&#8592; Who's Watching</button>
      <button class="hbb-btn" onclick="goTo('credits')">View End Credits &#8250;</button>
    </div>
  </div>

  <!-- CREDITS -->
  <div class="scene" id="s-credits">
    <div class="credits-photo" id="credits-slideshow"></div>
    <div class="credits-text-wrap">
      <div class="credits-inner" id="credits-inner"></div>
    </div>
  </div>

</div>

<script>
/* ─────────────────────────────────────────
   Safari 100vh fix
───────────────────────────────────────── */
function setVH(){
  const h=window.innerHeight+'px';
  document.body.style.height=h;
  document.getElementById('stage').style.height=h;
}
setVH(); window.addEventListener('resize',setVH);

/* ─────────────────────────────────────────
   PHOTO DATES
───────────────────────────────────────── */
const DATES={
  'images/ms2.jpg':      'September 2024',
  'images/p1.jpg':       'October 2024',
  'images/p2.jpg':       'October 2024',
  'images/hero.jpg':     'December 2024',
  'images/ms3.jpg':      'February 2025',
  'images/player.jpg':   'February 2025',
  'images/ms4.jpg':      'April 2025',
  'images/p3.jpg':       'April 2025',
  'images/p4.jpg':       'April 2025',
  'images/r2.jpg':       'April 2025',
  'images/r3.jpg':       'April 2025',
  'images/r4.jpg':       'April 2025',
  'images/credits.jpg':  'April 2025',
  'images/p5.jpg':       'May 2025',
  'images/r1.jpg':       'May 2025',
  'images/valentine.jpg':'February 14, 2025',
};
function badge(src){
  const d=DATES[src]; if(!d) return '';
  const m=d.match(/^(\w+)\s+(\d{4})$/);
  return m ? m[1].slice(0,3)+" '"+m[2].slice(2) : d;
}

/* ─────────────────────────────────────────
   PHOTO LIBRARY
───────────────────────────────────────── */
const P={
  val:   'images/valentine.jpg',
  // ms1.jpg (happy birthday group photo) removed per user request
  sep24: 'images/ms2.jpg',   // Sep 2024
  oct24a:'images/p1.jpg',    // Oct 2024
  oct24b:'images/p2.jpg',    // Oct 2024
  dec24: 'images/hero.jpg',  // Dec 2024
  feb25a:'images/ms3.jpg',   // Feb 2025
  feb25b:'images/player.jpg',// Feb 2025
  apr25a:'images/ms4.jpg',   // Apr 2025
  apr25b:'images/p3.jpg',
  apr25c:'images/p4.jpg',
  apr25d:'images/r2.jpg',
  apr25e:'images/r3.jpg',
  apr25f:'images/r4.jpg',

/* ─────────────────────────────────────────

   Each has its own ordered photo array.
   Play button shows these as a slideshow.
   Tiles display the same array.

  {
    label:'1 month', photo:P.oct24a,   // earliest couple photo we have

    desc:'Where it all started. The first chapter of us.',

/* credits slideshow */
const SLIDES=[
  {src:P.val,   ms:5000},

  {src:P.feb25a,ms:2800},{src:P.feb25b,ms:2800},

const CREDITS_DATA=[

/* ─────────────────────────────────────────
   ROUTING
───────────────────────────────────────── */
let _creditsSsTimer=null, _creditsSsIdx=0;

function goTo(key){
  document.querySelectorAll('.scene').forEach(el=>el.classList.remove('active'));
  if(key==='credits') _startCredits();
  document.getElementById('s-'+key).classList.add('active');
}

/* ─────────────────────────────────────────
   INTRO
───────────────────────────────────────── */
let _started=false;
function beginExperience(){
  if(_started)return; _started=true;
  const cover=document.getElementById('tap-cover');
  const vid=document.getElementById('intro-video');
  cover.style.transition='opacity .45s'; cover.style.opacity='0';
  setTimeout(()=>{cover.style.display='none';},500);
  vid.style.opacity='1';
  vid.muted=false; vid.volume=1;
  vid.play().catch(()=>{ vid.muted=true; vid.play().catch(()=>{}); });
  vid.addEventListener('ended',()=>goTo('profiles'),{once:true});
  setTimeout(()=>goTo('profiles'),6200);
}

/* ─────────────────────────────────────────
   WHO'S WATCHING
───────────────────────────────────────── */
function _buildProfiles(){
  document.getElementById('profiles-row').innerHTML=MILESTONES.map((m,i)=>`
    <div class="profile-item" onclick="openMilestone(${i})">
      <div class="profile-photo"><img src="${m.photo}" alt="${m.label}"></div>
      <span class="profile-label">${m.label}</span>
    </div>`).join('');
}

/* ─────────────────────────────────────────
   NETFLIX HOME
───────────────────────────────────────── */
let _currentMilestone=null;

function openMilestone(idx){
  _currentMilestone=MILESTONES[idx];
  const m=_currentMilestone;

  document.getElementById('home-hero-bg').innerHTML=`<img src="${m.hero}" alt="">`;
  document.getElementById('home-title').textContent=m.heading;
  document.getElementById('home-desc').textContent=m.desc;

  // Play button → open milestone slideshow
  document.getElementById('home-play-btn').onclick=()=>openSS(m.photos);

  // build ONE scrollable tile row
  document.getElementById('home-tiles').innerHTML=m.photos.map(src=>`
    <div class="tile" onclick="openLB('${src}')">
      <img src="${src}" alt="" loading="lazy">
      <span class="tile-date">${badge(src)}</span>
    </div>`).join('');

  goTo('home');
}

/* ─────────────────────────────────────────
   MILESTONE SLIDESHOW (Play button)
───────────────────────────────────────── */
let _ssPhotos=[], _ssIdx=0, _ssAutoTimer=null;
let _ssTouchX=0;

function openSS(photos){
  _ssPhotos=photos; _ssIdx=0;
  _buildSSDots();
  _showSS(0);
  document.getElementById('ss-overlay').classList.add('open');
  _ssSchedule();
}
function closeSS(){
  clearTimeout(_ssAutoTimer);
  document.getElementById('ss-overlay').classList.remove('open');
}
function ssStep(dir){
  clearTimeout(_ssAutoTimer);
  _showSS((_ssIdx+dir+_ssPhotos.length)%_ssPhotos.length);
  _ssSchedule();
}
function _showSS(idx){
  _ssIdx=idx;
  const src=_ssPhotos[idx];
  document.getElementById('ss-img').src=src;
  document.getElementById('ss-date').textContent=DATES[src]||'';
  document.getElementById('ss-counter').textContent=(idx+1)+' / '+_ssPhotos.length;
  document.querySelectorAll('.ss-dot').forEach((d,i)=>d.classList.toggle('on',i===idx));
}
function _ssSchedule(){
  clearTimeout(_ssAutoTimer);
  _ssAutoTimer=setTimeout(()=>{ ssStep(1); },3500);
}
function _buildSSDots(){
  document.getElementById('ss-dots').innerHTML=
    _ssPhotos.map((_,i)=>`<div class="ss-dot${i===0?' on':''}"></div>`).join('');
}

/* touch swipe for slideshow */
const ssWrap=document.getElementById('ss-img-wrap');
ssWrap.addEventListener('touchstart',e=>{_ssTouchX=e.touches[0].clientX;},{passive:true});
ssWrap.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-_ssTouchX;
  if(dx>45) ssStep(-1); else if(dx<-45) ssStep(1);
});

/* ─────────────────────────────────────────
   LIGHTBOX (tile tap)
───────────────────────────────────────── */
function openLB(src){
  document.getElementById('lb-img').src=src;
  document.getElementById('lb-date').textContent=DATES[src]||'';
  document.getElementById('lightbox').classList.add('open');
}
function closeLB(){document.getElementById('lightbox').classList.remove('open');}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeLB();closeSS();}
  if(e.key==='ArrowLeft'&&document.getElementById('ss-overlay').classList.contains('open'))ssStep(-1);
  if(e.key==='ArrowRight'&&document.getElementById('ss-overlay').classList.contains('open'))ssStep(1);
});

/* ─────────────────────────────────────────
   CREDITS
───────────────────────────────────────── */
function _buildCreditsList(){
  document.getElementById('credits-inner').innerHTML=CREDITS_DATA.map(([l,v])=>
    `<div class="credit-row"><span class="c-label">${l}</span><span class="c-value">${v}</span></div>`
  ).join('');
}
function _buildSlideshowDOM(){
  document.getElementById('credits-slideshow').innerHTML=
    SLIDES.map((s,i)=>`<img class="slide-img${i===0?' on':''}" src="${s.src}" alt="">`).join('');
}
function _startCredits(){
  const inner=document.getElementById('credits-inner');
  inner.style.animation='none'; void inner.offsetHeight;
  inner.style.animation='scrollUp 40s linear forwards';

  clearTimeout(_creditsSsTimer); _creditsSsIdx=0;
  const imgs=document.querySelectorAll('#credits-slideshow .slide-img');
  imgs.forEach((el,i)=>el.classList.toggle('on',i===0));
  _nextCreditSlide(imgs);

  const audio=document.getElementById('bgm');
  if(audio){audio.currentTime=47;audio.volume=0.85;audio.play().catch(()=>{});}
}
function _nextCreditSlide(imgs){
  if(!imgs.length)return;
  _creditsSsTimer=setTimeout(()=>{
    imgs[_creditsSsIdx].classList.remove('on');
    _creditsSsIdx=(_creditsSsIdx+1)%imgs.length;
    imgs[_creditsSsIdx].classList.add('on');
    _nextCreditSlide(imgs);
  }, SLIDES[_creditsSsIdx].ms);
}

/* ─────────────────────────────────────────
   INIT
───────────────────────────────────────── */
_buildProfiles();
_buildCreditsList();
_buildSlideshowDOM();
</script>
